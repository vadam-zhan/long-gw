{{- /*
ConfigMap template for long-gw configuration
*/ -}}
{{- if .Values.configMap.create }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "long-gw.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "long-gw.labels" . | nindent 4 }}
data:
  config.yaml: |
    gateway:
      addr: {{ .Values.gateway.addr | quote }}
      upstream_worker_num: {{ .Values.gateway.upstreamWorkerNum }}
      downstream_worker_num: {{ .Values.gateway.downstreamWorkerNum }}
      max_conn_num: {{ .Values.gateway.maxConnNum }}
      read_buf_size: {{ .Values.gateway.readBufSize }}
      write_buf_size: {{ .Values.gateway.writeBufSize }}

    {{- if .Values.redis.enabled }}
    redis:
      addr: {{ .Values.redis.addr | quote }}
      password: {{ .Values.redis.password | quote }}
      db: {{ .Values.redis.db }}
      pool_size: {{ .Values.redis.poolSize }}
      route_ttl: {{ .Values.redis.routeTTL }}
    {{- end }}

    upstream:
      kind: {{ .Values.upstream.kind | quote }}
      {{- if .Values.upstream.kafka.enabled }}
      kafka:
        brokers:
          {{- range .Values.kafka.brokers }}
          - {{ . | quote }}
          {{- end }}
        business_topics:
          {{- range $key, $val := .Values.kafka.businessTopics }}
          {{ $key }}:
            upstream_topic: {{ $val.upstreamTopic | quote }}
            downstream: {{ $val.downstreamTopic | quote }}
          {{- end }}
      {{- end }}
      {{- if .Values.upstream.grpc.enabled }}
      grpc:
        business_config:
          {{- range $key, $val := .Values.upstream.grpc.businessConfig }}
          {{ $key }}:
            grpc_addr: {{ $val.grpcAddr | quote }}
          {{- end }}
      {{- end }}

    downstream:
      kind: {{ .Values.downstream.kind | quote }}
      {{- if .Values.downstream.kafka.enabled }}
      kafka:
        brokers:
          {{- range .Values.kafka.brokers }}
          - {{ . | quote }}
          {{- end }}
      {{- end }}

    {{- if and .Values.auth.enabled }}
    auth:
      addr: {{ .Values.auth.addr | quote }}
    {{- end }}

    log:
      level: {{ .Values.log.level | quote }}
      format: {{ .Values.log.format | quote }}
      {{- if .Values.log.file }}
      file: {{ .Values.log.file | quote }}
      {{- end }}
{{- end }}
