syntax = "proto3";

package gateway.v1;

option go_package = "github.com/vadam-zhan/long-gw/proto/v1;gateway";

import "v1/message.proto";

// UpstreamKafkaMessage is sent from gateway to backend
message UpstreamKafkaMessage {
    string user_id = 1;                          // 用户 ID
    string device_id = 2;                       // 设备 ID
    string biz_code = 3;                         // 业务域标识
    SignalType original_type = 4;         // 原始消息类型
    string from = 5;                             // 发送方标识
    string to = 6;                               // 路由地址
    QoS qos = 7;                         // QoS 等级
    bool offline = 8;                            // 离线存储标志
    string trace_id = 9;                         // 追踪 ID
    Codec body_codec = 10;               // 编码格式
    CompressAlgo compress = 11;           // 压缩算法
    map<string, string> headers = 12;            // 扩展元数据
    string body_type = 13;                       // 业务子类型
    bytes payload = 14;                          // 业务载荷
    map<string, string> body_ext = 15;            // Body 扩展字段
}

// DownstreamKafkaMessage is sent from backend to gateway
message DownstreamKafkaMessage {
    string to = 1;                              // 路由地址 "u:{uid}" | "r:{roomID}" | "t:{topic}"
    string biz_code = 2;                         // 业务域标识
    SignalType target_type = 3;           // 投递到客户端的消息类型
    QoS qos = 4;                         // QoS 等级
    bool offline = 5;                            // 离线存储标志
    string trace_id = 6;                         // 追踪 ID
    Codec body_codec = 7;                 // 编码格式
    CompressAlgo compress = 8;            // 压缩算法
    map<string, string> headers = 9;             // 扩展元数据
    string body_type = 10;                        // 业务子类型
    bytes payload = 11;                          // 业务载荷
    map<string, string> body_ext = 12;           // Body 扩展字段
}
