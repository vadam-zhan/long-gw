syntax = "proto3";

package gateway.v1;

option go_package = "github.com/vadam-zhan/long-gw/proto/v1;gateway";

// 多个业务方: IM、直播、消息中心等，用于管理多个业务方的 worker 池
enum BusinessType {
    UNSPECIFIED = 0;
    IM = 1; // IM 业务
    LIVE = 2; // 直播业务
    MESSAGE = 3; // 消息中心业务
}

message PushMessageReq {
    string receiver = 1; // 接收者 ID
    bytes payload = 2; // 业务载荷
    BusinessType business_type = 4; // 业务类型
}

message PushMessageResp {
    bool success = 1; // 是否成功
    string message = 2; // 错误信息
}

service Gateway {
    rpc PushMessage(PushMessageReq) returns (PushMessageResp);
}
